<!-- Include fragment: copy inner of .demo-cinema into pages -->
<div class="demo-cinema demo-cinema--hero demo-cinema--wide" aria-hidden="true">
  <div class="dc-chips">
    <span class="dc-chip dc-chip--1">① Tap try-on</span>
    <span class="dc-chip dc-chip--2">② AI ~28s</span>
    <span class="dc-chip dc-chip--3">③ 77.8% → cart</span>
  </div>
  <div class="dc-phone">
    <div class="dc-notch" aria-hidden="true"></div>
    <div class="dc-status"><span class="dc-time">9:41</span><span class="dc-signal"><i></i><i></i><i></i></span></div>
    <div class="dc-screen">
      <article class="dc-layer dc-l-pdp">
        <header class="dc-shop-bar"><strong>Your Store</strong><em>Free shipping</em></header>
        <div class="dc-product-shot dc-product-shot--jersey"><span class="dc-shine" aria-hidden="true"></span></div>
        <div class="dc-pdp-meta">
          <h4>Shadow Stripe Jersey</h4>
          <div class="dc-stars" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i></div>
          <div class="dc-price-row"><span class="dc-price">€18.12</span><span class="dc-price-was">€24</span></div>
        </div>
        <div class="dc-actions">
          <button type="button" class="dc-btn dc-btn--try"><span class="dc-btn-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 8-8 8-8s8 3.6 8 8"/></svg></span>Try it on</button>
          <button type="button" class="dc-btn dc-btn--atc">Add to cart</button>
        </div>
      </article>
      <article class="dc-layer dc-l-modal">
        <div class="dc-dim" aria-hidden="true"></div>
        <div class="dc-sheet">
          <div class="dc-sheet-handle" aria-hidden="true"></div>
          <h5>See it on you</h5>
          <div class="dc-upload-box">
            <span class="dc-scan-line" aria-hidden="true"></span>
            <div class="dc-photo-thumb" aria-hidden="true"></div>
            <span style="font-size:8px;font-weight:600;color:var(--text-soft)">Photo uploaded</span>
          </div>
          <button type="button" class="dc-btn dc-btn--try" style="width:100%">Generate preview</button>
        </div>
      </article>
      <article class="dc-layer dc-l-ai">
        <div class="dc-ai-ring" aria-hidden="true"></div>
        <span class="dc-ai-text">AI fitting your look…</span>
        <div class="dc-ai-bar"><i></i></div>
        <span class="dc-ai-timer" aria-live="polite"></span>
      </article>
      <article class="dc-layer dc-l-result">
        <div class="dc-result-head"><span>Your result</span><span class="dc-badge-live">Live</span></div>
        <div class="dc-compare">
          <div class="dc-compare-before"><span class="dc-compare-label">Before</span><div class="dc-silhouette" aria-hidden="true"></div></div>
          <div class="dc-compare-after"><span class="dc-compare-label">Try-on</span><div class="dc-silhouette" aria-hidden="true"></div></div>
        </div>
        <div class="dc-result-cta"><button type="button" class="dc-btn dc-btn--try" style="width:100%">Add to cart — €18.12</button></div>
      </article>
      <article class="dc-layer dc-l-cart">
        <div class="dc-success-ring" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M5 12l5 5L19 7"/></svg></div>
        <p class="dc-cart-title">Added to cart</p>
        <span class="dc-metric-pill"><strong>77.8%</strong> try-on → cart</span>
      </article>
    </div>
  </div>
</div>
